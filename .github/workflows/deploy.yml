name: Deploy React to cPanel

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.1"

      - name: Install dependencies
        run: npm ci

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      # Step 1: Clean server folder
      - name: Clean admin folder (keep .htaccess)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          script: |
            cd public_html/admin || exit 1
            find . -mindepth 1 ! -name '.htaccess' -exec rm -rf {} +

      # Step 2: Upload build files
      - name: Upload build via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASS }}
          source: "dist/*"
          target: "public_html/admin/"
          strip_components: 1
